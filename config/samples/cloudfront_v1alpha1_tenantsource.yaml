# TenantSource example: discover tenants from a DynamoDB table.
# The operator periodically scans the table and creates/updates/deletes
# DistributionTenant CRs to match the table contents.
apiVersion: cloudfront-tenant-operator.io/v1alpha1
kind: TenantSource
metadata:
  labels:
    app.kubernetes.io/name: cloudfront-tenant-operator
    app.kubernetes.io/managed-by: kustomize
  name: dynamodb-tenants
spec:
  provider: dynamodb
  distributionId: "E1XNX8R2GOAABC"
  pollInterval: "5m"
  dryRun: false

  dynamodb:
    tableName: "tenants"
    region: "us-east-1"
    # Attribute mappings (defaults shown):
    nameAttribute: "name"       # partition key -> DistributionTenant metadata.name
    domainAttribute: "domain"   # -> spec.domains[0].domain
    # Optional attribute mappings:
    # enabledAttribute: "enabled"                     # -> spec.enabled (bool)
    # connectionGroupIdAttribute: "connection_group"  # -> spec.connectionGroupId
    # certificateArnAttribute: "cert_arn"             # -> spec.customizations.certificate.arn

  # Optional: request a CloudFront-managed ACM certificate for every tenant.
  # primaryDomainName is automatically set to each tenant's domain.
  # If a DynamoDB item has a certificateArn, it takes precedence over this.
  # managedCertificateRequest:
  #   validationTokenHost: "cloudfront"
